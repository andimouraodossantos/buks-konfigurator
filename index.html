<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BUKS Konfigurator</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* NUMMER-INPUT: Pfeile ausblenden */
        input[type="text"]::-webkit-inner-spin-button,
        input[type="text"]::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        input[type="text"] {
            -moz-appearance: textfield;
            appearance: textfield;
        }

        /* FONTS LADEN */
        @font-face {
            font-family: 'Ginto';
            src: url('https://cdn.prod.website-files.com/69472950d86d42b608dff17f/69473747c264f3658963c657_ABCGintoNord-Medium.woff2') format('woff2');
            font-weight: 500;
            font-style: normal;
            font-display: swap;
        }

        @font-face {
            font-family: 'Ginto';
            src: url('https://cdn.prod.website-files.com/69472950d86d42b608dff17f/69473763e1d72654dcb3d4ee_ABCGintoNord-Bold.woff2') format('woff2');
            font-weight: 700;
            font-style: normal;
            font-display: swap;
        }

        @font-face {
            font-family: 'PP Neue Montreal';
            src: url('https://cdn.prod.website-files.com/69472950d86d42b608dff17f/6947378506e75a5f76f39bb5_PPNeueMontreal-Medium.woff2') format('woff2');
            font-weight: 500;
            font-style: normal;
            font-display: swap;
        }

        /* GLOBAL RESETS */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Ginto', Georgia, sans-serif;
            background: white;
        }

        /* ANIMATIONS */
        .step-card {
            animation: fadeIn 0.3s;
            border: 1px solid black;
            border-top: none;
            padding-bottom: 2rem;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* OPTION CARD WITH IMAGE */
        .option-card {
            border: none;
            border-radius: 0;
            overflow: visible;
            cursor: pointer;
            transition: all 0.2s;
            background: transparent;
            display: flex;
            flex-direction: column;
        }

        .option-card:hover {
            box-shadow: none;
        }

        .option-card.active {
            border-color: transparent;
        }

        .option-card.disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* 🔥 ANTI-FLICKER: Sanftes Bild-Laden */
        .option-image-container {
            position: relative;
            aspect-ratio: 182/257;
            background: linear-gradient(135deg, #f5f5f5 25%, #e0e0e0 25%, #e0e0e0 50%, #f5f5f5 50%, #f5f5f5 75%, #e0e0e0 75%, #e0e0e0);
            background-size: 40px 40px;
            animation: shimmer 2s infinite linear;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            border: 1px solid black;
            border-radius: 5px;
            flex-shrink: 0;
        }

        @keyframes shimmer {
            0% {
                background-position: 0 0;
            }

            100% {
                background-position: 40px 40px;
            }
        }

        /* Icon während des Ladens */
        .option-image-container::before {
            content: '📷';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 48px;
            opacity: 0.3;
            z-index: 1;
        }

        /* Icon verschwindet wenn Bild geladen */
        .option-image-container.has-image::before {
            display: none;
        }

        /* 🔥 BILD STYLING */
        .option-image-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0;
            transition: opacity 0.3s ease-in-out;
            border-radius: 5px;
            transform: scale(1.2);
        }

        .option-image-container img.loaded {
            opacity: 1;
        }

        .option-checkmark {
            position: absolute;
            bottom: 8px;
            right: 8px;
            width: 28px;
            height: 28px;
            background: #FF5F37;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 16px;
            font-weight: bold;
            z-index: 2;
        }

        /* ✅ LABEL STYLING - FESTE HÖHE */
        .option-label {
            padding: 1rem 0.5rem;
            margin-top: -0.5rem;
            text-align: left;
            font-size: 14px;
            font-weight: 500;
            line-height: 16px;
            background: #EBDFC3;
            color: black;
            height: 70px;
            /* ✅ FESTE HÖHE für alle Labels */
            display: flex;
            align-items: flex-start;
            justify-content: flex-start;
            font-family: 'PP Neue Montreal', 'Ginto', sans-serif;
            border: none;
            border-radius: 0 0 5px 5px;
            overflow: hidden;
        }

        .option-card.active .option-label {
            background: #FF5F37;
            color: white;
        }

        /* GRID FOR CARDS WITH SUB-OPTIONS */
        .options-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            /* ✅ Kleinere Mindestbreite */
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        /* ✅ NEU: Desktop (>1400px) = 5 Columns */
        @media (min-width: 1400px) {
            .options-grid {
                grid-template-columns: repeat(5, 1fr);
            }
        }

        /* ✅ NEU: Tablet Landscape (1024px-1399px) = 4 Columns */
        @media (min-width: 1024px) and (max-width: 1399px) {
            .options-grid {
                grid-template-columns: repeat(4, 1fr);
            }
        }

        /* ✅ NEU: Tablet (768px-1023px) = 3 Columns */
        @media (min-width: 768px) and (max-width: 1023px) {
            .options-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        /* ✅ NEU: Mobile (480px-767px) = 2 Columns */
        @media (min-width: 480px) and (max-width: 767px) {
            .options-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        /* ✅ NEU: Small Mobile (<480px) = 1 Column */
        @media (max-width: 479px) {
            .options-grid {
                grid-template-columns: 1fr;
            }
        }

        /* SUB-OPTIONS CONTAINER (under card) */
        .sub-options-container {
            margin-top: 12px;
            padding: 12px;
            background: #F9FAFB;
            border-radius: 12px;
        }

        /* YES/NO BUTTON STYLE */
        .choice-button {
            padding: 12px 24px;
            border: 1px solid black;
            border-radius: 25px;
            font-size: 14px;
            font-weight: 500;
            line-height: 16px;
            cursor: pointer;
            transition: all 0.2s;
            background: #F3F3EB;
            color: black;
            font-family: 'PP Neue Montreal', sans-serif;
        }

        .choice-button.active {
            background: #FF5F37;
            color: white;
        }

        .choice-button:hover:not(.active) {
            background: #E8E9E0;
        }

        /* INPUT FIELDS */
        .input-field {
            border: 1px solid #FF5F37;
            border-radius: 17px;
            padding: 12px;
            font-size: 14px;
            color: #FF5F37;
            line-height: 1;
            width: 100%;
            outline: none;
            font-family: 'PP Neue Montreal', sans-serif;
        }

        .input-field::placeholder {
            color: #FF5F37;
            opacity: 0.6;
        }

        /* INFO TEXT */
        .info-text {
            font-family: 'PP Neue Montreal', sans-serif;
            font-size: 18px;
            line-height: 22px;
            font-weight: 500;
            color: black;
            margin-top: 34px;
        }

        /* SECTION DIVIDER */
        .section-divider {
            border-bottom: 1px solid #E5E7EB;
            margin: 32px 0;
        }

        /* SIDEBAR */
        .sidebar-item:hover {
            background: #f3f4f6;
            cursor: pointer;
        }

        .sidebar-group {
            border-left: 3px solid #e5e7eb;
            padding: 0 12px;
            margin-bottom: 16px;
            border-right: 3px solid #e5e7eb;
        }

        .sidebar-group.active {
            border-left-color: #FF5F37;
        }

        .sidebar-group-header {
            font-weight: 600;
            color: black;
            font-size: 0.75rem;
            margin-bottom: 8px;
            text-transform: uppercase;
            cursor: pointer;
            font-family: 'PP Neue Montreal', sans-serif;
        }

        .sidebar-group-header:hover {
            color: #FF5F37;
        }

        /* STICKY BUTTON */
        .sticky-button {
            position: sticky;
            bottom: 20px;
            z-index: 50;
        }

        /* PRIMARY BUTTON */
        .btn-primary {
            display: block;
            /* hinzufügen */
            margin: 0 auto;
            background: #FF5F37;
            color: white;
            padding: 12px 24px;
            border-radius: 17px;
            font-size: 16px;
            font-weight: 600;
            border: none;
            cursor: pointer;
            transition: all 0.2s;
            width: 97%;
            font-family: 'PP Neue Montreal', sans-serif;
        }

        .btn-primary:hover {
            background: #E54F2F;
            box-shadow: 0 4px 12px rgba(255, 95, 55, 0.3);
        }

        /* SECONDARY BUTTON */
        .btn-secondary {
            display: block;
            /* hinzufügen */
            margin: 0 auto;
            background: white;
            color: black;
            padding: 12px 24px;
            border-radius: 17px;
            font-size: 14px;
            font-weight: 600;
            border: none;
            cursor: pointer;
            transition: all 0.2s;
            width: 97%;
            font-family: 'PP Neue Montreal', sans-serif;
            border: 1px solid black;
        }

        .btn-secondary:hover {
            background: #E8E9E0;
        }

        /* SKIP BUTTON */
        .btn-skip {
            background: white;
            color: #6B7280;
            padding: 12px 24px;
            border-radius: 17px;
            font-size: 14px;
            font-weight: 500;
            border: 1px solid #E5E7EB;
            cursor: pointer;
            transition: all 0.2s;
            width: 100%;
            font-family: 'PP Neue Montreal', sans-serif;
        }

        .btn-skip:hover {
            background: #F9FAFB;
            border-color: #D1D5DB;
        }

        /* STEP PILLS */
        .step-pill {
            padding: 10px 20px;
            border-radius: 25px;
            font-size: 14px;
            font-weight: 500;
            border: none;
            cursor: pointer;
            transition: all 0.2s;
            font-family: 'PP Neue Montreal', sans-serif;
            border: 1px solid black;
        }

        .step-pill.active {
            background: #FF5F37;
            color: white;
        }

        .step-pill.completed {
            background: #F3F3EB;
            color: black;
        }

        .step-pill.disabled {
            background: #F9FAFB;
            color: #9CA3AF;
            cursor: not-allowed;
        }

        .step-pill.completed:hover {
            background: #E8E9E0;
        }

        /* FIELD ERROR */
        .field-error {
            border-color: #ef4444 !important;
            background-color: #fef2f2 !important;
        }

        .required-star {
            color: #ef4444;
            margin-left: 2px;
        }

        /* PAGE HINT */
        .page-hint {
            background: #dbeafe;
            border-left: 4px solid #3b82f6;
            padding: 8px 12px;
            margin-top: 4px;
            border-radius: 4px;
            font-size: 0.75rem;
            color: #1e40af;
            font-family: 'PP Neue Montreal', sans-serif;
        }

        /* TWO COLUMN LAYOUT */
        .two-column-field {
            display: grid;
            grid-template-columns: 1fr 4fr;
            /* ✅ MEHR PLATZ: 1:4 statt 2:3 */
            gap: 2rem;
            /* ✅ Größerer Gap */
            padding: 4.5rem 2.5rem;
            border-bottom: 1px solid black;
        }

        /* ✅ Tablet: 1:3 Verhältnis */
        @media (min-width: 769px) and (max-width: 1200px) {
            .two-column-field {
                grid-template-columns: 1fr 3fr;
                gap: 1.5rem;
            }
        }

        /* ✅ Mobile: Stack vertikal */
        @media (max-width: 768px) {
            .two-column-field {
                grid-template-columns: 1fr;
                gap: 1rem;
            }
        }

        /* INDIVIDUELLE ANPASSUNGEN */
        .max-w-7xl {
            max-width: 160rem !important;
        }

        .mb-6 {
            padding: 24px;
        }

        .block.font-medium.mb-2 {
            margin-bottom: 1rem;
        }

        .sidebar-group-header span:first-child {
            color: #000;
            font-size: 14px;
        }

        h3.font-bold.text-lg.mb-4 {
            color: #000;
            font-size: 1.5rem;
        }

        /* SIDEBAR ITEMS: GINTO ORANGE + MONTREAL SCHWARZ */
        .sidebar-item p:first-child {
            font-family: 'Ginto', Georgia, sans-serif;
            color: #FF5F37;
            font-size: 0.75rem;
            font-weight: 500;
        }

        .sidebar-item p:last-child {
            font-family: 'PP Neue Montreal', sans-serif;
            color: #000;
            font-size: 0.75rem;
            font-weight: 500;
        }

        /* FLIESSTEXT & HINTS MIT NEUE MONTREAL */
        p,
        .text-sm,
        .text-xs {
            font-family: 'PP Neue Montreal', sans-serif;
        }

        /* GINTO FÜR ÜBERSCHRIFTEN */
        h1,
        h2,
        h3,
        h4,
        h5,
        h6 {
            font-family: 'Ginto', Georgia, sans-serif;
        }

        /* SPEZIFISCHE HINT-TEXTE */
        .bg-blue-50 p,
        .bg-yellow-50 p,
        .placeholder-warning p {
            font-family: 'PP Neue Montreal', sans-serif;
        }

        .bg-white {
            background-color: #F3F3EB !important;
        }

        /* TWO-COLUMN FIELD LABELS IN MONTREAL BOLD */
        .two-column-field h3 {
            font-family: 'PP Neue Montreal', sans-serif !important;
            font-weight: 500 !important;
        }

        .bg-white.rounded-lg.shadow.p-4.mb-6.sticky.top-0.z-40 {
            background-color: white !important;

        }


        .sticky.top-24.max-h-\[calc\(100vh-120px\)\].overflow-y-auto.bg-white {
            background-color: #ffffff !important;
        }

        .bg-white.rounded-lg.shadow.p-6.mb-6 {
            background-color: #ffffff !important;
        }

        .bg-gray-50 {
            background-color: white !important;
        }

        /* ✅ NEU: BINDEART & FORMAT GRID - RESPONSIVE */
        .bindings-grid {
            display: grid;
            gap: 1rem;
            padding: 4.5rem 2rem;
        }

        /* Desktop XL (>1400px) = 5 Columns */
        @media (min-width: 1400px) {
            .bindings-grid {
                grid-template-columns: repeat(5, 1fr);
            }
        }

        /* Desktop (1024px-1399px) = 4 Columns */
        @media (min-width: 1024px) and (max-width: 1399px) {
            .bindings-grid {
                grid-template-columns: repeat(4, 1fr);
            }
        }

        /* Tablet Landscape (768px-1023px) = 3 Columns */
        @media (min-width: 768px) and (max-width: 1023px) {
            .bindings-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        /* Tablet (480px-767px) = 2 Columns */
        @media (min-width: 480px) and (max-width: 767px) {
            .bindings-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        /* Mobile (<480px) = 1 Column */
        @media (max-width: 479px) {
            .bindings-grid {
                grid-template-columns: 1fr;
            }
        }

        /* ✅ HAUPTTITEL ORANGE + RECHTS AUSRICHTEN */
        .main-title {
            color: #FF5F37 !important;
            font-family: 'Ginto', Georgia, sans-serif;
        }

        .border-bottom-black {
            border-bottom: 1px solid #000;
        }

        .white-bg-top {
            background-color: white;
        }

        .bindings-grid+.info-text {
            padding-left: 2rem;
            padding-right: 2rem;
        }

        .mb-6.p-4.bg-gray-50.rounded-lg.border.border-gray-200 {
            margin: 0 2rem;
            position: relative;
            top: 1rem;
        }
    </style>
</head>
<style>
    :root {
        --font-from: 18;
        --font-to: 20;
        --vw-from: calc(1920 / 100);
        --vw-to: calc(2400 / 100);
        --coefficient: calc((var(--font-to) - var(--font-from)) / (var(--vw-to) - var(--vw-from)));
        --base: calc((var(--font-from) - var(--vw-from) * var(--coefficient)) / 16);
    }

    html {
        font-size: calc(var(--base) * 1rem + var(--coefficient) * 1vw);
    }

    @media screen and (max-width: 1920px) {
        :root {
            --font-from: 16;
            --font-to: 18;
            --vw-from: calc(1440 / 100);
            --vw-to: calc(1920 / 100);
        }
    }

    @media screen and (max-width: 1440px) {
        :root {
            --font-from: 12;
            --font-to: 15;
            --vw-from: calc(479 / 100);
            --vw-to: calc(1440 / 100);
        }
    }

    @media screen and (max-width: 479px) {
        :root {
            --font-from: 12;
            --font-to: 16;
            --vw-from: calc(1 / 100);
            --vw-to: calc(479 / 100);
        }
    }
</style>

<body class="bg-gray-50">
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;

        // 🔥 ZENTRALE FIELD CONFIGURATION - SINGLE SOURCE OF TRUTH
        const FIELD_CONFIG = {
            // ==================== BASICS ====================
            bindeart: {
                label: 'Bindeart',
                step: 1,
                group: 'basics',
                getValue: (fd) => fd.bindeart?.split('-').map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(' ')
            },

            format: {
                label: 'Format',
                step: 2,
                group: 'basics',
                getValue: (fd) => {
                    if (fd.format) return fd.format;
                    if (fd.individuellFormat && fd.formatBreite && fd.formatHoehe) {
                        return `${fd.formatBreite}×${fd.formatHoehe}mm (${fd.formatOrientierung})`;
                    }
                    return null;
                }
            },

            // ==================== CONTENT ====================
            seitenzahl: {
                label: 'Seitenzahl',
                step: 4,
                group: 'content',
                getValue: (fd) => fd.seitenzahl
            },

            scans: {
                label: 'Scans',
                step: 3,
                group: 'content',
                getValue: (fd) => {
                    if (!fd.scans) return null;
                    if (fd.scans === 'ja' && fd.scansInsgesamt) {
                        return `${fd.scans} (${fd.scansInsgesamt} Seiten)`;
                    }
                    return fd.scans;
                }
            },

            layoutUndSatz: {
                label: 'Layout und Satz',
                step: 3,
                group: 'content',
                getValue: (fd) => {
                    if (!fd.layoutUndSatz) return null;
                    if (fd.layoutUndSatz === 'ja' && fd.anzahlManuskriptseiten) {
                        return `${fd.layoutUndSatz} (${fd.anzahlManuskriptseiten} Seiten)`;
                    }
                    return fd.layoutUndSatz;
                }
            },

            gestaltungEinband: {
                label: 'Gestaltung Einband',
                step: 3,
                group: 'content',
                getValue: (fd) => fd.gestaltungEinband
            },

            lektorat: {
                label: 'Lektorat',
                step: 3,
                group: 'content',
                getValue: (fd) => {
                    if (!fd.lektorat) return null;
                    if (fd.lektorat === 'ja' && fd.gesamtseitenzahlManuskript) {
                        return `${fd.lektorat} (${fd.gesamtseitenzahlManuskript} Seiten)`;
                    }
                    return fd.lektorat;
                }
            },

            zusaetzlichDispersionslack: {
                label: 'Zusätzlich Dispersionslack',
                step: 4,
                group: 'content',
                getValue: (fd) => fd.zusaetzlichDispersionslack
            },

            erweiterterFarbraum: {
                label: 'Erweiterter Farbraum',
                step: 4,
                group: 'content',
                getValue: (fd) => {
                    if (!fd.erweiterterFarbraum) return null;
                    if (fd.erweiterterFarbraum === 'ja' && fd.erweiterterFarbraumTyp) {
                        return fd.erweiterterFarbraumTyp;
                    }
                    return fd.erweiterterFarbraum;
                }
            },

            beratungFarbraster: {
                label: 'Beratung Farbraster',
                step: 4,
                group: 'content',
                getValue: (fd) => fd.beratungFarbraster
            },

            farbschnitt: {
                label: 'Farbschnitt',
                step: 4,
                group: 'content',
                getValue: (fd) => {
                    if (!fd.farbschnitt) return null;
                    if (fd.farbschnitt === 'ja' && fd.farbschnittTyp) {
                        return fd.farbschnittTyp;
                    }
                    return fd.farbschnitt;
                }
            },

            buchecken: {
                label: 'Buchecken',
                step: 4,
                group: 'content',
                getValue: (fd) => fd.buchecken
            },

            karton: {
                label: 'Karton',
                step: 4,
                group: 'content',
                getValue: (fd) => fd.karton
            },

            spacer: {
                label: 'Spacer',
                step: 4,
                group: 'content',
                getValue: (fd) => {
                    if (!fd.spacer) return null;
                    if (fd.spacer === 'ja' && fd.spacerFarbig === 'ja') {
                        return 'Ja (farbig)';
                    }
                    return fd.spacer;
                }
            },

            // ==================== BINDING ====================
            ringfarbe: {
                label: 'Ringfarbe',
                step: 5,
                group: 'binding',
                getValue: (fd) => fd.ringfarbe
            },

            klammerfarbe: {
                label: 'Klammerfarbe',
                step: 5,
                group: 'binding',
                getValue: (fd) => fd.klammerfarbe
            },

            anzahlKlammern: {
                label: 'Anzahl Klammern',
                step: 5,
                group: 'binding',
                getValue: (fd) => fd.anzahlKlammern
            },

            ausfuehrung: {
                label: 'Ausführung',
                step: 5,
                group: 'binding',
                getValue: (fd) => fd.ausfuehrung
            },

            alternativeExemplare: {
                label: 'Alternative Exemplare',
                step: 5,
                group: 'binding',
                getValue: (fd) => {
                    if (fd.alternativeExemplare !== 'ja') return fd.alternativeExemplare;

        // 🔥 DYNAMISCHE SUMMARY-GENERATOR FUNKTION
        function generateSummary(formData) {
            const summary = {
                basics: [],
                content: [],
                binding: [],
                cover: [],
                finishing: [],
                final: []
            };

            // 🔥 AUTO: Durch FIELD_CONFIG iterieren
            Object.entries(FIELD_CONFIG).forEach(([field, config]) => {
                const value = config.getValue(formData);
                if (value && value !== '' && value !== null && value !== undefined) {
                    summary[config.group].push({
                        label: config.label,
                        value: value,
                        step: config.step
                    });
                }
            });

            // 🔥 MANUELL: Komplexe Array-Felder - DRUCK INNENTEIL
            if (formData.druckInnenteil && formData.druckInnenteil.length > 0) {
                const druckNamen = {
                    'unbedruckt': 'Unbedruckt',
                    '1-1': '1/1 Schwarz',
                    '2-2': '2/2 Schwarz + HKS/Pantone',
                    '4-4': '4/4 CMYK',
                    '5-5': '5/5 CMYK + HKS/Pantone'
                };

                formData.druckInnenteil.forEach(d => {
                    const name = druckNamen[d] || d;
                    const seiten = formData.druckInnenteilSeitenzahlen[d]
                        ? `${formData.druckInnenteilSeitenzahlen[d]} Seiten`
                        : '';
                    summary.content.push({
                        label: `Druck Innenteil: ${name}`,
                        value: seiten || name,
                        step: 4
                    });
                });
            }

            // 🔥 MANUELL: Komplexe Array-Felder - PAPIER
            if (formData.papier && formData.papier.length > 0) {
                formData.papier.forEach(p => {
                    const gram = formData.papierGrammatur[p] ? `${formData.papierGrammatur[p]}g/m²` : '';
                    const eingabe = formData.papierSeitenzahlen[p] || '';
                    const typ = formData.papierEingabeTyp[p] || 'seiten';
                    const seiten = eingabe
                        ? (typ === 'blatt' ? `${eingabe} Blatt (${parseInt(eingabe) * 2} Seiten)` : `${eingabe} Seiten`)
                        : '';
                    const details = [gram, seiten].filter(Boolean).join(', ');
                    summary.content.push({
                        label: `Papier: ${p}`,
                        value: details || p,
                        step: 4
                    });
                });
            }

            // 🔥 MANUELL: Alternative Exemplare (komplexe Varianten)
            if (formData.alternativeExemplare === 'ja' && formData.alternativeExemplareVarianten.length > 0) {
                formData.alternativeExemplareVarianten.forEach((variant, index) => {
                    if (variant.name || variant.anzahl) {
                        const details = [variant.name, variant.anzahl ? `${variant.anzahl} Stück` : '']
                            .filter(Boolean)
                            .join(': ');
                        summary.binding.push({
                            label: `Alternative Exemplare ${index + 1}`,
                            value: details || `Variante ${index + 1}`,
                            step: 5
                        });
                    }
                });
            }

            // 🔥 MANUELL: Aufkleber (viele Unterfelder)
            if (formData.aufkleber === 'ja') {
                if (formData.aufkleberGroesse) {
                    summary.finishing.push({ label: 'Aufkleber Größe', value: formData.aufkleberGroesse, step: 8 });
                }
                if (formData.aufkleberAnbringen) {
                    summary.finishing.push({ label: 'Aufkleber Anbringen', value: formData.aufkleberAnbringen, step: 8 });
                }
                if (formData.aufkleberForm) {
                    summary.finishing.push({ label: 'Aufkleber Form', value: formData.aufkleberForm, step: 8 });
                }
                if (formData.aufkleberMaterial) {
                    summary.finishing.push({ label: 'Aufkleber Material', value: formData.aufkleberMaterial, step: 8 });
                }
                if (formData.aufkleberFarbigkeit) {
                    summary.finishing.push({ label: 'Aufkleber Farbigkeit', value: formData.aufkleberFarbigkeit, step: 8 });
                }
            }

            return summary;
        }

            const allSteps = [

                // Durch 4 teilbar
                if (bindeart === 'hardcover-fadenheftung' ||
                    bindeart === 'softcover-fadenheftung' ||
                    bindeart === 'broschuere-rueckstich' ||
                    bindeart === 'broschuere-faden') {
                    return '💡 Die Seitenzahl muss durch 4 teilbar sein.';
                }

                // Durch 2 teilbar (Standard für Hardcover Klebebindung, Softcover Klebebindung, Wire-O)

                    bindeart === 'softcover-klebebindung' ||
                    bindeart === 'wire-o') {
                    return '💡 Die Seitenzahl muss durch 2 teilbar sein.';

                    <div className="mb-6"><label className="block font-medium mb-2">Anmerkungen:</label><textarea value={a} onChange={e => { setA(e.target.value); add('step8', e.target.value); }} placeholder="Ihre Anmerkungen" className="input-field" style={{ minHeight: '96px' }} /></div>
                    <div className="bg-blue-50 border-l-4 border-blue-500 p-4 mb-4"><p className="text-sm text-blue-800">💡 Wenn Sie jetzt "Rückruf vereinbaren" klicken, senden wir Ihre bisherigen Angaben an unser Team.</p></div>
                    <button onClick={() => rueckruf('Weiterverarbeitung')} className="btn-secondary mb-4">Rückruf vereinbaren</button>
                    <div className="sticky-button">
                        <button onClick={() => nextStep()} className="btn-primary">Weiter</button>
                    </div>
                </div>
            );
        }

        // 🔥 STEP 9 - SCHUTZUMSCHLAG (MIT BILDERN + ANTI-FLICKER)
        function Step9({ formData, update, updateWithReset, add, rueckruf, nextStep, stepLabel, BILDER }) {
            const [a, setA] = useState(formData.anmerkungen?.step9 || '');

            const schutzumschlagMaterialOpts = [
                { id: 'Bilderdruckpapier matt', name: 'Bilderdruckpapier matt' },
                { id: 'Bilderdruckpapier glänzend', name: 'Bilderdruckpapier glänzend' },
                { id: 'Naturpapier', name: 'Naturpapier' },
                { id: 'Werkdruckpapier', name: 'Werkdruckpapier' }
            ];

            const druckSchutzumschlagOpts = [
                { id: 'Unbedruckt', name: 'Unbedruckt' },
                { id: '1/0', name: '1/0' },
                { id: '2/0 Schwarz + HKS/Pantone', name: '2/0 Schwarz + HKS/Pantone' },
                { id: '4/0 CMYK', name: '4/0 CMYK' },
                { id: '5/0 CMYK + HKS/Pantone', name: '5/0 CMYK + HKS/Pantone' },
                { id: '1/1 (Schwarz)', name: '1/1 (Schwarz)' },
                { id: '2/2 Schwarz + HKS/Pantone', name: '2/2 Schwarz + HKS/Pantone' },
                { id: '4/4 CMYK', name: '4/4 CMYK' },
                { id: '5/5 CMYK + HKS/Pantone', name: '5/5 CMYK + HKS/Pantone' }
            ];

            return (
                <div className="step-card">


                    <div className="mb-6 p-4 bg-gray-50 rounded-lg border border-gray-200">
                        <p className="text-sm text-gray-600 mb-3">💡 Alle Felder in diesem Schritt sind optional.</p>
                        <button onClick={() => nextStep()} className="btn-skip">
                            Diesen Schritt überspringen →
                        </button>
                    </div>

                    <TwoColumnField label="Schutzumschlag?">
                        <div className="flex gap-4 mb-4">
                            <button onClick={() => update('schutzumschlag', 'ja')} className={`choice-button ${formData.schutzumschlag === 'ja' ? 'active' : ''}`}>Ja</button>
                            <button onClick={() => update('schutzumschlag', 'nein')} className={`choice-button ${formData.schutzumschlag === 'nein' ? 'active' : ''}`}>Nein</button>
                        </div>
                        {formData.schutzumschlag === 'ja' && (
                            <div className="options-grid">
                                {schutzumschlagMaterialOpts.map(m => (
                                    <div key={m.id} onClick={() => update('schutzumschlagMaterial', m.id)}
                                        className={`option-card ${formData.schutzumschlagMaterial === m.id ? 'active' : ''}`}>
                                        <div className="option-image-container">
                                            <img
                                                src={BILDER.schutzumschlag.default}
                                                alt={m.name}
                                                onLoad={(e) => {
                                                    e.target.classList.add('loaded');
                                                    e.target.parentElement.classList.add('has-image');
                                                }}
                                                onError={(e) => {
                                                    e.target.src = BILDER.default;
                                                    e.target.classList.add('loaded');
                                                    e.target.parentElement.classList.add('has-image');
                                                }}
                                            />
                                            {formData.schutzumschlagMaterial === m.id && <div className="option-checkmark">✓</div>}
                                        </div>
                                        <div className="option-label">{m.name}</div>
                                    </div>
                                ))}
                            </div>
                        )}
                    </TwoColumnField>

                    {formData.schutzumschlag === 'ja' && (
                        <TwoColumnField label="Druck Schutzumschlag?">
                            <div className="flex gap-4 mb-4">
                                <button onClick={() => update('druckSchutzumschlag', 'ja')} className={`choice-button ${formData.druckSchutzumschlag === 'ja' ? 'active' : ''}`}>Ja</button>
                                <button onClick={() => update('druckSchutzumschlag', 'nein')} className={`choice-button ${formData.druckSchutzumschlag === 'nein' ? 'active' : ''}`}>Nein</button>
                            </div>
                            {formData.druckSchutzumschlag === 'ja' && (
                                <div className="options-grid">
                                    {druckSchutzumschlagOpts.map(d => (
                                        <div key={d.id} onClick={() => update('druckSchutzumschlagTyp', d.id)}
                                            className={`option-card ${formData.druckSchutzumschlagTyp === d.id ? 'active' : ''}`}>
                                            <div className="option-image-container">
                                                <img
                                                    src={BILDER.druckSchutzumschlag.default}
                                                    alt={d.name}
                                                    onLoad={(e) => {
                                                        e.target.classList.add('loaded');
                                                        e.target.parentElement.classList.add('has-image');
                                                    }}
                                                    onError={(e) => {
                                                        e.target.src = BILDER.default;
                                                        e.target.classList.add('loaded');
                                                        e.target.parentElement.classList.add('has-image');
                                                    }}
                                                />
                                                {formData.druckSchutzumschlagTyp === d.id && <div className="option-checkmark">✓</div>}
                                            </div>
                                            <div className="option-label">{d.name}</div>
                                        </div>
                                    ))}
                                </div>
                            )}
                        </TwoColumnField>
                    )}

                    <div className="mb-6"><label className="block font-medium mb-2">Anmerkungen:</label><textarea value={a} onChange={e => { setA(e.target.value); add('step9', e.target.value); }} placeholder="Ihre Anmerkungen" className="input-field" style={{ minHeight: '96px' }} /></div>
                    <div className="bg-blue-50 border-l-4 border-blue-500 p-4 mb-4"><p className="text-sm text-blue-800">💡 Wenn Sie jetzt "Rückruf vereinbaren" klicken, senden wir Ihre bisherigen Angaben an unser Team.</p></div>
                    <button onClick={() => rueckruf('Schutzumschlag')} className="btn-secondary mb-4">Rückruf vereinbaren</button>
                    <div className="sticky-button">
                        <button onClick={() => nextStep()} className="btn-primary">Weiter</button>
                    </div>
                </div>
            );
        }

        // 🔥 STEP 10 - DRUCKDATEN (KEINE BILDER)
        function Step10({ formData, update, updateWithReset, add, rueckruf, nextStep, stepLabel }) {
            const [a, setA] = useState(formData.anmerkungen?.step10 || '');
            const fields = [
                { field: 'druckdatenkorrektur', label: 'Druckdatenkorrektur', text: 'Wir prüfen Ihre Druckdaten auf technische Machbarkeit.' },
                { field: 'druckdatenerstellung', label: 'Druckdatenerstellung', text: 'Wir erstellen für Sie professionelle Druckdaten.' },
                { field: 'probeseiten', label: 'Probeseiten', text: 'Vor dem Druck senden wir Ihnen Probeseiten zur Ansicht.' },
                { field: 'vorabexemplar', label: 'Vorabexemplar', text: 'Sie erhalten ein komplettes Vorabexemplar zur Freigabe.' },
                { field: 'farbproof', label: 'Farbproof', text: 'Digitaler Proof zur farbverbindlichen Ansicht.' },
                { field: 'formproof', label: 'Formproof', text: 'Proof zur Überprüfung von Format und Beschnitt.' }
            ];

            return (
                <div className="step-card">


                    <div className="mb-6 p-4 bg-gray-50 rounded-lg border border-gray-200">
                        <p className="text-sm text-gray-600 mb-3">💡 Alle Felder in diesem Schritt sind optional.</p>
                        <button onClick={() => nextStep()} className="btn-skip">
                            Diesen Schritt überspringen →
                        </button>
                    </div>

                    {fields.map((item, idx) => (
                        <TwoColumnField key={idx} label={item.label}>
                            <div className="flex gap-4 mb-2">
                                <button onClick={() => update(item.field, 'ja')} className={`choice-button ${formData[item.field] === 'ja' ? 'active' : ''}`}>Ja</button>
                                <button onClick={() => update(item.field, 'nein')} className={`choice-button ${formData[item.field] === 'nein' ? 'active' : ''}`}>Nein</button>
                            </div>
                            <p className="info-text">{item.text}</p>
                        </TwoColumnField>
                    ))}

                    <div className="mb-6"><label className="block font-medium mb-2">Anmerkungen:</label><textarea value={a} onChange={e => { setA(e.target.value); add('step10', e.target.value); }} placeholder="Ihre Anmerkungen" className="input-field" style={{ minHeight: '96px' }} /></div>
                    <div className="bg-blue-50 border-l-4 border-blue-500 p-4 mb-4"><p className="text-sm text-blue-800">💡 Wenn Sie jetzt "Rückruf vereinbaren" klicken, senden wir Ihre bisherigen Angaben an unser Team.</p></div>
                    <button onClick={() => rueckruf('Druckdaten')} className="btn-secondary mb-4">Rückruf vereinbaren</button>
                    <div className="sticky-button">
                        <button onClick={() => nextStep()} className="btn-primary">Weiter zur Zusammenfassung</button>
                    </div>
                </div>
            );
        }
        // 🔥 STEP 11 - ZUSAMMENFASSUNG (DYNAMISCH GENERIERT)
        function Step11({ formData, summaryByGroup, stepGroups, nextStep, stepLabel }) {
            return (
                <div className="step-card">

                    <p className="text-lg mb-8 p-8">Bitte überprüfen Sie Ihre Angaben:</p>

                    {Object.entries(stepGroups).map(([groupKey, groupInfo]) => {
                        const items = summaryByGroup[groupKey];
                        if (items.length === 0) return null;

                        return (
                            <div key={groupKey} className=" p-8">
                                <h3 className="text-xl font-bold mb-4" style={{ color: '#FF5F37' }}>{groupInfo.label}</h3>
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                    {items.map((item, idx) => (
                                        <div key={idx} className="p-4 bg-gray-50 rounded-lg border border-gray-200">
                                            <p className="text-sm text-gray-600 mb-1">{item.label}</p>
                                            <p className="font-semibold">{item.value}</p>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        );
                    })}

                    {Object.values(summaryByGroup).every(g => g.length === 0) && (
                        <div className="bg-yellow-50 border-l-4 border-yellow-500 p-4 mb-6">
                            <p className="text-sm text-yellow-800">
                                ⚠️ Es wurden noch keine Angaben gemacht. Bitte gehen Sie zurück und füllen Sie das Formular aus.
                            </p>
                        </div>
                    )}

                    <div className="bg-blue-50 border-l-4 border-blue-500 p-4 mb-6">
                        <p className="text-sm text-blue-800">
                            💡 Bitte überprüfen Sie Ihre Angaben. Im nächsten Schritt geben Sie Ihre Kontaktdaten ein.
                        </p>
                    </div>

                    <div className="sticky-button">
                        <button onClick={() => nextStep()} className="btn-primary">
                            Weiter zu Kontaktdaten
                        </button>
                    </div>
                </div>
            );
        }

        // 🔥 STEP 12 - KONTAKT (KEINE BILDER)
        function Step12({ formData, update, stepLabel }) {
            const [showErrors, setShowErrors] = useState(false);

            const handleSubmit = () => {
                if (!formData.firma || !formData.nachname || !formData.vorname || !formData.email || !formData.telefon || !formData.liefertermin || !formData.strasse || !formData.plz || !formData.ort || !formData.datenschutzAkzeptiert) {
                    setShowErrors(true);
                    alert('Bitte alle Pflichtfelder ausfüllen und Datenschutz akzeptieren');
                    return;
                }
                console.log('FINAL SUBMIT:', formData);
                alert('Vielen Dank! Ihre Anfrage wurde übermittelt.');
            };

            return (
                <div className="step-card">


                    <TwoColumnField label="Firma" required>
                        <input type="text" value={formData.firma} onChange={e => update('firma', e.target.value)} className={`input-field ${showErrors && !formData.firma ? 'field-error' : ''}`} placeholder="Firmenname" />
                    </TwoColumnField>

                    <TwoColumnField label="Nachname" required>
                        <input type="text" value={formData.nachname} onChange={e => update('nachname', e.target.value)} className={`input-field ${showErrors && !formData.nachname ? 'field-error' : ''}`} placeholder="Nachname" />
                    </TwoColumnField>

                    <TwoColumnField label="Vorname" required>
                        <input type="text" value={formData.vorname} onChange={e => update('vorname', e.target.value)} className={`input-field ${showErrors && !formData.vorname ? 'field-error' : ''}`} placeholder="Vorname" />
                    </TwoColumnField>

                    <TwoColumnField label="E-Mail" required>
                        <input type="email" value={formData.email} onChange={e => update('email', e.target.value)} className={`input-field ${showErrors && !formData.email ? 'field-error' : ''}`} placeholder="email@beispiel.de" />
                    </TwoColumnField>

                    <TwoColumnField label="Telefon" required>
                        <input type="tel" value={formData.telefon} onChange={e => update('telefon', e.target.value)} className={`input-field ${showErrors && !formData.telefon ? 'field-error' : ''}`} placeholder="+49 123 456789" />
                    </TwoColumnField>

                    <TwoColumnField label="Gewünschter Liefertermin" required>
                        <input type="date" value={formData.liefertermin} onChange={e => update('liefertermin', e.target.value)} className={`input-field ${showErrors && !formData.liefertermin ? 'field-error' : ''}`} />
                    </TwoColumnField>

                    <TwoColumnField label="Straße, Hausnummer" required>
                        <input type="text" value={formData.strasse} onChange={e => update('strasse', e.target.value)} className={`input-field ${showErrors && !formData.strasse ? 'field-error' : ''}`} placeholder="Musterstraße 123" />
                    </TwoColumnField>

                    <TwoColumnField label="PLZ" required>
                        <input type="text" value={formData.plz} onChange={e => update('plz', e.target.value)} className={`input-field ${showErrors && !formData.plz ? 'field-error' : ''}`} placeholder="12345" />
                    </TwoColumnField>

                    <TwoColumnField label="Ort" required>
                        <input type="text" value={formData.ort} onChange={e => update('ort', e.target.value)} className={`input-field ${showErrors && !formData.ort ? 'field-error' : ''}`} placeholder="Berlin" />
                    </TwoColumnField>

                    <div className="two-column-field">
                        <div></div>
                        <div>
                            <label className="flex items-start space-x-3 cursor-pointer">
                                <input type="checkbox" checked={formData.beratungGewuenscht} onChange={e => update('beratungGewuenscht', e.target.checked)} className="w-5 h-5 mt-1" />
                                <span className="text-sm">Ich wünsche eine Beratung</span>
                            </label>
                        </div>
                    </div>

                    <div className="two-column-field">
                        <div></div>
                        <div>
                            <label className="flex items-start space-x-3 cursor-pointer">
                                <input type="checkbox" checked={formData.datenschutzAkzeptiert} onChange={e => update('datenschutzAkzeptiert', e.target.checked)} className={`w-5 h-5 mt-1 ${showErrors && !formData.datenschutzAkzeptiert ? 'field-error' : ''}`} />
                                <span className="text-sm">
                                    Ich akzeptiere die Datenschutzerklärung<span className="required-star">*</span>
                                </span>
                            </label>
                        </div>
                    </div>

                    <div className="sticky-button">
                        <button onClick={handleSubmit} className="btn-primary">Anfrage absenden</button>
                    </div>
                </div>
            );
        }

        // 🔥 RENDER APP
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<BuksKonfigurator />);
    </script>
</body>

</html>
